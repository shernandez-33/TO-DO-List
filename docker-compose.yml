services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
      POSTGRES_DB: todo_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://todo_user:todo_pass@db:5432/todo_db
    depends_on:
      - db

  frontend:
    build: ./frontend-react
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
